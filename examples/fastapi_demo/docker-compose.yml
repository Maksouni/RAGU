services:
  memgraph:
    image: memgraph/memgraph:3.8.1
    container_name: memgraph-demo
    ports:
      - "127.0.0.1:7687:7687"
    volumes:
      - memgraph_data:/var/lib/memgraph

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: memgraph-lab-demo
    depends_on:
      - memgraph
    ports:
      - "127.0.0.1:3000:3000"

  vllm:
    image: vllm/vllm-openai:v0.17.1
    container_name: vllm-demo
    volumes:
      - ./.models:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8080:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - "--model"
      - "Qwen/Qwen2.5-3B-Instruct-AWQ"
      - "--gpu-memory-utilization"
      - "0.55"
      - "--max-model-len"
      - "4096"

  vllm-embed:
    image: vllm/vllm-openai:v0.17.1
    container_name: vllm-embed-demo
    volumes:
      - ./.models:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8081:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - "--model"
      - "nomic-ai/nomic-embed-text-v1.5"
      - "--trust-remote-code"
      - "--gpu-memory-utilization"
      - "0.12"
      - "--max-model-len"
      - "1024"

  grg:
    build:
      context: ../..
      dockerfile: examples/fastapi_demo/Dockerfile
    container_name: grg-demo
    depends_on:
      - memgraph
    environment:
      - API_KEY=text
      - BASE_URL=http://vllm-demo:8000/v1
      - EMBEDDING_BASE_URL=http://vllm-embed-demo:8000/v1
      - LLM_MODEL_NAME=Qwen/Qwen2.5-3B-Instruct-AWQ
      - EMBEDDER_MODEL_NAME=nomic-ai/nomic-embed-text-v1.5
      - MEMGRAPH_URI=bolt://memgraph:7687
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ragu_working_dir:/app/ragu_working_dir
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  memgraph_data:
  ragu_working_dir:
